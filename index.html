<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon Card Guesser</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      
      <!-- LANDING PAGE -->
      <section id="home-view" class="view-section">
        <header>
          <h1>Pokemon Card Guesser</h1>
          <p class="subtitle">Select a Game Mode</p>
        </header>

        <div class="mode-selection glass">
          <button class="mode-btn" data-mode="moving">
            <h2>Moving Card</h2>
            <p>Guess the Pokemon from a continuously panning zoomed-in view.</p>
          </button>
          
          <button class="mode-btn" data-mode="zoom">
            <h2>Normal Zoom (5 Lives)</h2>
            <p>Starts moderately zoomed into the top half of the card. Five guesses to win, zooms out steadily on each mistake.</p>
          </button>

          <button class="mode-btn" data-mode="zoom-insane">
            <h2>Insanity Zoom (5 Lives)</h2>
            <p>Starts extremely zoomed in directly into the artwork. Very small hints until the final guess!</p>
          </button>
          
          <button class="mode-btn" data-mode="set">
            <h2>Guess the Set</h2>
            <p>We hide the set symbol. Can you guess which Set this card belongs to?</p>
          </button>
        </div>
      </section>

      <!-- GAME VIEW -->
      <section id="game-view" class="view-section hidden">
        <header>
          <div class="nav-bar">
            <button id="back-home-btn" class="icon-btn">← Home</button>
            <h2 id="mode-title">Game Mode</h2>
            <div style="width: 70px;"></div> <!-- spacer -->
          </div>
          <div class="score-board">
            <div class="score-item" id="lives-container" style="display: none;">
              <span class="score-label">Lives</span>
              <span class="score-value" id="lives-counter">5</span>
            </div>
            <div class="score-item">
              <span class="score-label">Streak</span>
              <span class="score-value" id="streak-counter">0</span>
            </div>
            <div class="score-item">
              <span class="score-label">Best</span>
              <span class="score-value" id="best-counter">0</span>
            </div>
          </div>
        </header>

        <main class="game-container">
          <div class="card-display glass">
            <!-- card-wrapper gets .loading to hide image until ready -->
            <div id="card-wrapper" class="card-wrapper loading">
              <div id="loading-spinner" class="spinner"></div>
              <!-- Dynamic img will be injected here -->
              <img id="card-image" src="" alt="Guess this Pokemon Card" />
            </div>
            <div id="feedback-overlay" class="feedback-overlay hidden">
              <h2 id="feedback-text">Correct!</h2>
              <p id="feedback-subtext">It was Pikachu</p>
            </div>
          </div>

          <div class="controls glass">
            <form id="guess-form">
              <input 
                type="text" 
                id="guess-input" 
                placeholder="Who's that Pokemon?" 
                autocomplete="off"
                disabled
              />
              <button type="submit" id="submit-btn" disabled>Guess</button>
            </form>
            <div class="action-buttons">
              <button id="skip-btn" class="secondary" disabled>Skip</button>
              <button id="next-btn" class="primary hidden">Next Card</button>
            </div>
          </div>
        </main>
      </section>

    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
